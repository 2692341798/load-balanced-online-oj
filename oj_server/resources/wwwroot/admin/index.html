<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 管理后台</title>
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">仪表盘</h1>
        </div>

        <div class="dashboard-stats">
            <div class="stat-card">
                <h3 id="stat-users">-</h3>
                <p>总用户数</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-problems">-</h3>
                <p>总题目数</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-submissions">-</h3>
                <p>总提交数</p>
            </div>
        </div>

        <div class="dashboard-stats">
            <div class="card" style="flex: 2;">
                <div class="card-header">用户增长趋势</div>
                <canvas id="userGrowthChart"></canvas>
            </div>
            <div class="card" style="flex: 1;">
                <div class="card-header">提交状态分布</div>
                <canvas id="submissionChart"></canvas>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">近期活跃度</div>
            <canvas id="activityChart" height="100"></canvas>
        </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script>
        renderSidebar('dashboard');

        async function initDashboard() {
            try {
                // Check Auth
                const authRes = await fetch('/api/profile');
                const authData = await authRes.json();
                if (authData.status !== 0 || authData.role !== 1) {
                    window.location.href = '/admin/login.html';
                    return;
                }

                // Fetch Stats
                const res = await fetch('/api/admin/stats');
                const result = await res.json();
                
                if (result.status === 0) {
                    const data = result.data;
                    document.getElementById('stat-users').textContent = data.total_users;
                    document.getElementById('stat-problems').textContent = data.total_problems;
                    document.getElementById('stat-submissions').textContent = data.total_submissions;

                    renderCharts(data);
                } else {
                    console.error('Failed to load stats:', result.reason);
                }
            } catch (e) {
                console.error('Error loading dashboard', e);
                // Fallback for demo if API fails
                /*
                renderCharts({
                    user_growth: { 'Day 1': 5, 'Day 2': 8, 'Day 3': 12, 'Day 4': 15, 'Day 5': 20, 'Day 6': 25, 'Day 7': 30 },
                    submission_stats: { 'Accepted': 40, 'Wrong Answer': 20, 'Time Limit': 10, 'Others': 5 },
                    daily_activity: { 'Mon': 10, 'Tue': 15, 'Wed': 8, 'Thu': 20, 'Fri': 25, 'Sat': 18, 'Sun': 30 }
                });
                */
            }
        }

        function renderCharts(data) {
            // User Growth Chart
            const userGrowthLabels = Object.keys(data.user_growth || {});
            const userGrowthData = Object.values(data.user_growth || {});
            new Chart(document.getElementById('userGrowthChart'), {
                type: 'line',
                data: {
                    labels: userGrowthLabels.length > 0 ? userGrowthLabels : ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5', 'Day 6', 'Day 7'],
                    datasets: [{
                        label: 'New Users',
                        data: userGrowthData.length > 0 ? userGrowthData : [0, 0, 0, 0, 0, 0, 0],
                        borderColor: '#007bff',
                        tension: 0.1
                    }]
                }
            });

            // Submission Stats Chart
            const subLabels = Object.keys(data.submission_stats || {});
            const subData = Object.values(data.submission_stats || {});
            new Chart(document.getElementById('submissionChart'), {
                type: 'doughnut',
                data: {
                    labels: subLabels,
                    datasets: [{
                        data: subData,
                        backgroundColor: ['#28a745', '#dc3545', '#ffc107', '#6c757d']
                    }]
                }
            });

            // Activity Chart
            const activityLabels = Object.keys(data.daily_activity || {});
            const activityData = Object.values(data.daily_activity || {});
            new Chart(document.getElementById('activityChart'), {
                type: 'bar',
                data: {
                    labels: activityLabels.length > 0 ? activityLabels : ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Submissions',
                        data: activityData.length > 0 ? activityData : [0, 0, 0, 0, 0, 0, 0],
                        backgroundColor: '#17a2b8'
                    }]
                }
            });
        }

        initDashboard();
    </script>
</body>
</html>
