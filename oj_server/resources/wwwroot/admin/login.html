<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - Load Balanced OJ</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <h2>管理员登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button onclick="login()" class="btn btn-primary" style="width: 100%">登录</button>
            <div class="mt-20 text-center">
                <a href="register.html">注册新管理员</a>
            </div>
            <div id="error-msg" class="error-msg"></div>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();

                if (result.status === 0) {
                    // Check if admin
                    const profileRes = await fetch('/api/profile');
                    const profile = await profileRes.json();
                    
                    if (profile.status === 0 && profile.role === 1) {
                        window.location.href = '/admin/index.html';
                    } else {
                        errorDiv.textContent = '拒绝访问：非管理员账号';
                        errorDiv.style.display = 'block';
                        // Optional: Logout to clear session if not admin
                        await fetch('/api/logout');
                    }
                } else {
                    errorDiv.textContent = result.reason;
                    errorDiv.style.display = 'block';
                }
            } catch (e) {
                errorDiv.textContent = '登录失败: ' + e.message;
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
