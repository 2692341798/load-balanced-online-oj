<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员注册 - Online OJ</title>
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .register-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .register-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <div class="register-container" id="register-box">
        <h2>管理员注册</h2>
        <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>邀请码</label>
                <input type="text" id="code" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">注册</button>
        </form>
        <div class="mt-20 text-center">
            <a href="login.html">已有账号？去登录</a>
        </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script>
        async function checkAuth() {
            try {
                const res = await fetch('/api/profile');
                const data = await res.json();
                if (data.status === 0 && data.role === 1) {
                    // Logged in as admin
                    renderSidebar('register');
                    document.getElementById('register-box').style.margin = '20px auto';
                    document.body.classList.add('main-content'); 
                    // Wait, sidebar.js injects sidebar. CSS .main-content adds margin-left.
                    // If I add class main-content to body, it might affect the layout of the register box which is centered.
                    // The CSS .main-content { margin-left: 250px; }
                    // If I add it, the whole body shifts.
                    // The register box uses margin: 50px auto.
                    // If body has margin-left: 250px, the "auto" margin of register box will center it within the remaining space.
                    // That seems correct.
                    document.body.classList.add('main-content');
                }
            } catch (e) {
                // Not logged in, do nothing (no sidebar)
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;

            try {
                const res = await fetch('/api/admin/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email, invitation_code: code })
                });
                const result = await res.json();
                if (result.status === 0) {
                    alert('注册成功！请登录。');
                    window.location.href = 'login.html';
                } else {
                    alert('注册失败: ' + result.reason);
                }
            } catch (e) {
                alert('请求失败');
            }
        }

        checkAuth();
    </script>
</body>
</html>
