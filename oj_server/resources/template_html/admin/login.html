<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Load Balanced OJ</title>
    <link rel="stylesheet" href="/css/common.css?v=2">
    <link rel="stylesheet" href="/css/login.css?v=2">
</head>
<body>
    <div class="login-page" style="min-height: 100vh; margin-top: 0;">
        <!-- 背景装饰 -->
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>

        <div class="login-card">
            <h2 style="text-align: center; margin-bottom: 30px; color: var(--text-main);">Admin Login</h2>
            <div id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter admin username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <div class="error" id="error-msg"></div>
                <button onclick="login()" type="submit" style="width: 100%;">Login</button>
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();

                if (result.status === 0) {
                    // Check if admin
                    const profileRes = await fetch('/api/profile');
                    const profile = await profileRes.json();
                    
                    if (profile.status === 0 && profile.role === 1) {
                        window.location.href = '/admin/index.html';
                    } else {
                        errorDiv.textContent = 'Access Denied: Not an admin';
                        errorDiv.style.display = 'block';
                    }
                } else {
                    errorDiv.textContent = result.reason;
                    errorDiv.style.display = 'block';
                }
            } catch (e) {
                errorDiv.textContent = 'Login failed: ' + e.message;
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
