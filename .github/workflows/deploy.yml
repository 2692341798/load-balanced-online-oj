name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "~/load-balanced-online-oj"
          # Don't delete existing files on server to preserve logs/db backups if any
          rm: false 
          # Exclude files that are not needed for deployment or are generated artifacts
          exclude: ".git,.github,.vscode,.trae,output,build,**/*.o,**/*.d,**/__pycache__,**/.DS_Store"

      - name: Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            echo "Starting remote deployment..."
            
            # 1. Navigate to docker directory
            # Path matches scripts/deploy_docker.sh: ~/load-balanced-online-oj
            TARGET_DIR=~/load-balanced-online-oj
            cd $TARGET_DIR/docker
            
            # 2. Restart services
            echo "Rebuilding and restarting Docker containers..."
            docker compose down
            docker compose up -d --build
            
            # 3. Cleanup
            echo "Cleaning up unused images..."
            docker image prune -f
            
            # 4. Verify deployment
            echo "Verifying service status on port 8094..."
            sleep 10
            if curl -s --head --request GET http://localhost:8094 | grep "200 OK" > /dev/null; then 
               echo "Service is up and running on port 8094!"
            else
               echo "Warning: Service check returned non-200 status or failed. Please check logs."
               # Don't fail the build yet as startup might take longer, just warn
            fi
            
            echo "Deployment finished successfully!"
