# Nginx Configuration for High Concurrency Reverse Proxy

worker_processes auto; # Automatically set to the number of CPU cores
worker_rlimit_nofile 65535; # Increase the maximum number of open file descriptors

events {
    worker_connections 10240; # Max connections per worker
    multi_accept on; # Accept multiple connections at once
}

http {
    # If mime.types doesn't exist in conf directory, you might need to use absolute path or include default types
    # include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;
    keepalive_requests 1000; # Max requests per keepalive connection

    # Gzip Compression
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream backend (oj_server)
    upstream oj_backend {
        server 127.0.0.1:8096;
        
        # Keepalive connections to upstream for high concurrency
        keepalive 64;
    }

    server {
        listen       80;
        server_name  localhost;

        location / {
            proxy_pass http://oj_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection ""; # Clear Connection header for keepalive to upstream
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Error pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
